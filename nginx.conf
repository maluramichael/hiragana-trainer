events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen 8000;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers (server-weit). nginx vererbt add_header NICHT in
        # location-Bloecke mit eigenem add_header, daher unten im Asset-Block
        # wiederholt.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        # 'unsafe-inline' im script-src ist noetig, weil index.html ein Inline-
        # Consent-<script> und inline onclick-Handler enthaelt und zur Laufzeit das
        # OWA-Script von analytics.malura.de nachgeladen wird. Ticket #81 lagert das
        # Consent-Script in ein gebuendeltes JS aus -> dann reicht script-src 'self'
        # und 'unsafe-inline' kann entfallen.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.malura.de; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://analytics.malura.de; connect-src 'self' https://analytics.malura.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Der Service Worker ist der Update-Kanal und darf NIE aggressiv gecacht
        # werden, sonst erreichen neue Builds die Clients verzoegert. Immer
        # revalidieren. Security-Header hier wiederholen (add_header vererbt nicht).
        location = /sw.js {
            add_header Cache-Control "no-cache" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.malura.de; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://analytics.malura.de; connect-src 'self' https://analytics.malura.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Security-Header hier wiederholen, da ein eigenes add_header die
            # server-weiten Header in diesem Block sonst ausblendet.
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.malura.de; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://analytics.malura.de; connect-src 'self' https://analytics.malura.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        }
    }
}
